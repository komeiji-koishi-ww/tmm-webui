services:
  tmm-webui:
    build: .
    container_name: tmm-webui
    ports:
      - "8080:8080"
    environment:
      TMMWEB_DATA: /config
      TMMWEB_SCAN_MEDIAINFO: "1"
      TMMWEB_MEDIAINFO_WORKERS: "1"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
    volumes:
      - ./data:/config
      - /path/to/media:/media
    restart: unless-stopped
